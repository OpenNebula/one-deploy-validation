---
- hosts: all
  roles:
    - role: validation_common

- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: test_vm
      when: validation.run_test_vm | d(true)
    - role: storage-benchmark
      when: validation.run_storage_benchmark | d(true)
    - role: ldap_auth
      when: validation.run_ldap_auth | d(false)
      tags:
        - ldap_auth
    - role: validation_frontend
    - role: network_validation
      when: validation.networks_verification | d(true)

# Run connectivity tests between virtual machines
- hosts: "{{ node_group | d('node') }},{{ frontend_group | d('frontend') }}"
  gather_facts: true
  roles:
    - role: conn_matrix
      when: validation.run_conn_matrix | d(true)

# Run network tests on the hypervisor hosts
- hosts: "{{ node_group | d('node') }}"
  roles:
    - role: network-benchmark

# VM HA Validation
- hosts: "{{ frontend_group | d('frontend') }}"
  tasks:
    - name: VM HA Validation
      include_role:
        name: vm-ha
      when: validation.run_vm_ha | d(false)

# Cleanup the test VMs
- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: cleanup_test_vm

# Will launch validation framework on the frontends
- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: validation

# Will launch OneFlow Smoke test
- hosts: "{{ frontend_group | d('frontend') }}"
  tasks:
    - block:
        - name: Run OneFlow validation
          import_role:
            name: oneflow_validation
      rescue:
        - debug:
            msg: "OneFlow role failed, continue with the rest"
      always:
        - debug:
            msg: "Proceeding to the next role"

# Run FE HA verification only when variable run_fe_ha is set to true
- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: fe_ha
      when: validation.run_fe_ha | d(false)

# Run Federation validation when variable run_federation is set to true
- hosts: "{{ frontend_group | d('frontend') }}"
  roles:
    - role: federation
      when: validation.run_federation | d(false)

# Render verification report
- hosts: localhost
  gather_facts: false
  become: false
  vars:
    report_frontend_host: "{{ groups[frontend_group | d('frontend')][0] }}"
    report_verification_result: "{{ hostvars[report_frontend_host].verification_result | default({'No verification results were found': 'N/A'}) }}"
    report_verification_comments: "{{ hostvars[report_frontend_host].verification_comments | default({}) }}"
    report_network_verification_results: "{{ hostvars[report_frontend_host].network_verification_results | default({'No Network verification results were found': {'N/A':'N/A'}}) }}"
    date: "{{ lookup('pipe', 'date +%Y-%m-%d\\ %H:%M:%S') }}"
    validation_vars: "{{ hostvars[report_frontend_host].validation | default({}) }}"
    report_default_abstract: >-
      This report describes the actions to verify the configuration and operational level of the OpenNebula cloud. As a result of this analysis the operational level of each component is established, if needed specific configuration updates are recommended.
  vars_prompt:
    - name: prompt_report_customer
      prompt: "Customer"
      private: false
    - name: prompt_report_document_version
      prompt: "Report version"
      private: false
    - name: prompt_report_abstract
      prompt: "Abstract (leave blank to use default)"
      private: false
      default: ""
    - name: prompt_report_revision_comment
      prompt: "Revision history comment (optional)"
      private: false
      default: ""
    - name: prompt_report_revision_version
      prompt: "Revision history version (leave blank to reuse report version)"
      private: false
      default: ""
  tasks:
    - name: Get repository version
      ansible.builtin.shell: |
        git describe --tags --exact-match 2>/dev/null || git rev-parse --short HEAD
      args:
        chdir: "{{ playbook_dir }}/.."
      register: repo_version_cmd
      changed_when: false

    - name: Collect network benchmark results from node hosts
      # Build a map of node -> { iperf_results, ping_exec } so the report can render them
      ansible.builtin.set_fact:
        network_benchmark: "{{ network_benchmark | default({}) | combine({ item: {'iperf_results': hostvars[item].iperf_results | default(None), 'ping_exec': hostvars[item].ping_exec | default(None)} }) }}"
      loop: "{{ groups[node_group | d('node')] }}"
      loop_control:
        label: "{{ item }}"

    - name: Collect storage benchmark results from frontend hosts
      # Merge storage_benchmark maps built by the role
      ansible.builtin.set_fact:
        storage_benchmark: "{{ storage_benchmark | default({}) | combine(hostvars[item].storage_benchmark | default({}), recursive=True) }}"
      loop: "{{ groups[frontend_group | d('frontend')] }}"
      loop_control:
        label: "{{ item }}"

    - name: Collect federation results from all frontend hosts
      # Build a map of frontend -> verification_result for federation checks
      ansible.builtin.set_fact:
        all_federation_results: "{{ all_federation_results | default({}) | combine({item: hostvars[item].verification_result | default({})}) }}"
      loop: "{{ groups[frontend_group | d('frontend')] }}"
      when:
        - hostvars[item].verification_result is defined
        - validation.run_federation | d(false)
      loop_control:
        label: "{{ item }}"

    - name: Build IP -> hostname mapping for report
      ansible.builtin.set_fact:
        ip_to_hostname: "{{ ip_to_hostname | default({}) | combine({ (hostvars[item].get('ansible_host')): item }) }}"
      loop: "{{ groups['all'] }}"
      when: hostvars[item].get('ansible_host', '') != ''
      loop_control:
        label: "{{ item }}"

    - name: Build frontend architecture inventory context
      ansible.builtin.set_fact:
        report_arch_frontend_inventory: >-
          {{
            (report_arch_frontend_inventory | default([])) + [{
              'inventory_name': item,
              'ansible_host': hostvars[item].get('ansible_host', ''),
              'overrides': (((validation_vars.architecture | default({})).frontends | default({})).get(item, {}))
            }]
          }}
      loop: "{{ groups[frontend_group | d('frontend')] }}"
      loop_control:
        label: "{{ item }}"

    - name: Build hypervisor architecture inventory context
      ansible.builtin.set_fact:
        report_arch_hypervisor_inventory: >-
          {{
            (report_arch_hypervisor_inventory | default([])) + [{
              'inventory_name': item,
              'ansible_host': hostvars[item].get('ansible_host', ''),
              'overrides': (((validation_vars.architecture | default({})).hypervisors | default({})).get(item, {}))
            }]
          }}
      loop: "{{ groups[node_group | d('node')] }}"
      loop_control:
        label: "{{ item }}"

    - name: Discover OpenNebula architecture for report
      ansible.builtin.shell: |
        python3 - <<'PY'
        import ipaddress
        import json
        import os
        import re
        import socket
        import subprocess
        import xml.etree.ElementTree as ET
        from urllib.parse import urlparse

        def env_json(name, default):
            raw = os.environ.get(name, "").strip()
            if not raw:
                return default
            try:
                return json.loads(raw)
            except Exception:
                return default

        def run(cmd):
            try:
                return subprocess.run(cmd, capture_output=True, text=True, check=True).stdout
            except Exception:
                return ""

        def normalized(value):
            return (value or "").strip().lower().split(".", 1)[0]

        def resolve_ipv4(host):
            if not host:
                return ""
            if host in {"localhost", "127.0.0.1"}:
                out = run(["hostname", "-I"]).strip()
                return out.split()[0] if out else ""
            try:
                return socket.gethostbyname(host)
            except Exception:
                return ""

        def endpoint_host(endpoint):
            if not endpoint:
                return ""
            parsed = urlparse(endpoint)
            return parsed.hostname or ""

        def pretty_detail(name, host):
            addr = resolve_ipv4(host)
            if addr and addr != host:
                return f"{host} · {addr}"
            return host or addr or name

        def mask_to_prefix(mask):
            if not mask:
                return ""
            try:
                return str(sum(bin(int(part)).count("1") for part in mask.split(".")))
            except Exception:
                return ""

        def infer_cidr(vnet):
            template = vnet.get("template", {})
            network_address = template.get("network_address", "")
            network_mask = template.get("network_mask", "")
            if network_address and network_mask:
                prefix = mask_to_prefix(network_mask)
                if prefix:
                    return f"{network_address}/{prefix}"
            ars = vnet.get("ars", [])
            first_ar = ars[0] if ars else {}
            base_ip = first_ar.get("ip", "")
            end_ip = first_ar.get("ip_end", "")
            size = first_ar.get("size", "")
            if base_ip and end_ip:
                return f"{base_ip}-{end_ip}"
            if base_ip and size:
                try:
                    end_ip = str(ipaddress.ip_address(base_ip) + int(size) - 1)
                    return f"{base_ip}-{end_ip}"
                except Exception:
                    pass
            return base_ip or network_address or ""

        def network_css_class(index):
            classes = ["nm", "ns", "np"]
            return classes[index % len(classes)]

        def find_match(discovered_name, host_hint, inventory_items):
            discovered_ip = resolve_ipv4(host_hint)
            name_keys = {normalized(discovered_name), normalized(host_hint)}
            for item in inventory_items:
                inv_name = item.get("inventory_name", "")
                inv_host = item.get("ansible_host", "")
                inv_host_ip = resolve_ipv4(inv_host) if inv_host else ""
                if normalized(inv_name) in name_keys:
                    return item
                if inv_host and host_hint and (
                    inv_host == host_hint
                    or normalized(inv_host) == normalized(host_hint)
                    or (discovered_ip and inv_host == discovered_ip)
                    or (inv_host_ip and discovered_ip and inv_host_ip == discovered_ip)
                ):
                    return item
            return None

        def display_label(matched, overrides, fallback):
            return overrides.get("label") or (matched.get("inventory_name") if matched else "") or fallback

        frontend_inventory = env_json("ARCH_FRONTENDS_JSON", [])
        hypervisor_inventory = env_json("ARCH_HYPERVISORS_JSON", [])
        frontend_role_label = os.environ.get("ARCH_FRONTEND_ROLE_LABEL", "OpenNebula FE VM")
        hypervisor_role_label = os.environ.get("ARCH_HYPERVISOR_ROLE_LABEL", "KVM")

        zone_list = run(["onezone", "list"])
        zone_ids = []
        for line in zone_list.splitlines():
            m = re.match(r"^\s*\*?\s*(\d+)\s+", line)
            if m:
                zone_ids.append(m.group(1))
        if not zone_ids:
            zone_ids = ["0"]

        host_pool_xml = run(["onehost", "list", "--xml"])
        vnet_pool_xml = run(["onevnet", "list", "--xml"])
        vm_pool_xml = run(["onevm", "list", "--xml"])

        vnets = {}
        if vnet_pool_xml:
            try:
                root = ET.fromstring(vnet_pool_xml)
            except Exception:
                root = None
            if root is not None:
                for index, vnet in enumerate(root.findall("./VNET")):
                    vnet_id = vnet.findtext("ID") or ""
                    name = vnet.findtext("NAME") or f"VNET {vnet_id}"
                    template = {
                        "network_address": vnet.findtext("./TEMPLATE/NETWORK_ADDRESS") or "",
                        "network_mask": vnet.findtext("./TEMPLATE/NETWORK_MASK") or "",
                        "gateway": vnet.findtext("./TEMPLATE/GATEWAY") or "",
                        "bridge": vnet.findtext("./TEMPLATE/BRIDGE") or vnet.findtext("BRIDGE") or "",
                    }
                    ars = []
                    for ar in vnet.findall("./AR_POOL/AR"):
                        ars.append({
                            "ip": ar.findtext("IP") or "",
                            "ip_end": ar.findtext("IP_END") or "",
                            "size": ar.findtext("SIZE") or "",
                        })
                    vnets[vnet_id] = {
                        "id": vnet_id,
                        "label": name,
                        "cidr": infer_cidr({"template": template, "ars": ars}),
                        "class": network_css_class(index),
                        "gateway": template["gateway"],
                        "bridge": template["bridge"],
                        "vm_ips": [],
                        "hosts": set(),
                    }

        frontends = []
        seen_fe = set()
        for zone_id in zone_ids:
            zone_xml = run(["onezone", "show", "--xml", zone_id])
            if not zone_xml:
                continue
            try:
                root = ET.fromstring(zone_xml)
            except Exception:
                root = None
            if root is None:
                continue

            zone_name = root.findtext("NAME") or f"Zone {zone_id}"
            zone_endpoint = root.findtext("./TEMPLATE/ENDPOINT") or ""
            if zone_endpoint:
                host = endpoint_host(zone_endpoint) or "localhost"
                if host in {"localhost", "127.0.0.1"}:
                    host = socket.getfqdn() or host
                endpoint_key = (zone_id, zone_endpoint)
                if endpoint_key not in seen_fe:
                    matched = find_match(zone_name, host, frontend_inventory)
                    if matched is None and len(frontend_inventory) == 1:
                        matched = frontend_inventory[0]
                    overrides = matched.get("overrides", {}) if matched else {}
                    frontends.append({
                        "label": display_label(matched, overrides, zone_name),
                        "role_label": overrides.get("role_label", frontend_role_label),
                        "network_ips": overrides.get("network_ips", []),
                        "detail": overrides.get("detail") or pretty_detail(zone_name, host),
                        "endpoint": zone_endpoint,
                        "zone_id": zone_id,
                        "zone_name": zone_name,
                    })
                    seen_fe.add(endpoint_key)

            for server in root.findall("./SERVER_POOL/SERVER"):
                server_name = server.findtext("NAME") or server.findtext("SERVER_NAME") or "Frontend Server"
                server_endpoint = server.findtext("ENDPOINT") or server.findtext("RPC") or server.findtext("SERVER_RPC") or ""
                if not server_endpoint:
                    continue
                endpoint_key = (zone_id, server_endpoint)
                if endpoint_key in seen_fe:
                    continue
                host = endpoint_host(server_endpoint) or server_name
                if host in {"localhost", "127.0.0.1"}:
                    host = socket.getfqdn() or host
                matched = find_match(server_name, host, frontend_inventory)
                overrides = matched.get("overrides", {}) if matched else {}
                frontends.append({
                    "label": display_label(matched, overrides, server_name),
                    "role_label": overrides.get("role_label", frontend_role_label),
                    "network_ips": overrides.get("network_ips", []),
                    "detail": overrides.get("detail") or pretty_detail(server_name, host),
                    "endpoint": server_endpoint,
                    "zone_id": zone_id,
                    "zone_name": zone_name,
                })
                seen_fe.add(endpoint_key)

        if not frontends:
            host = socket.getfqdn() or "localhost"
            matched = find_match("OpenNebula", host, frontend_inventory)
            if matched is None and len(frontend_inventory) == 1:
                matched = frontend_inventory[0]
            overrides = matched.get("overrides", {}) if matched else {}
            frontends.append({
                "label": display_label(matched, overrides, "OpenNebula"),
                "role_label": overrides.get("role_label", frontend_role_label),
                "network_ips": overrides.get("network_ips", []),
                "detail": overrides.get("detail") or pretty_detail("OpenNebula", host),
                "endpoint": "",
            })

        host_network_membership = {}
        if vm_pool_xml:
            try:
                root = ET.fromstring(vm_pool_xml)
            except Exception:
                root = None
            if root is not None:
                for vm in root.findall("./VM"):
                    history = vm.find("./HISTORY_RECORDS/HISTORY")
                    host_name = history.findtext("HOSTNAME") if history is not None else ""
                    host_network_membership.setdefault(host_name, {})
                    for nic in vm.findall("./TEMPLATE/NIC"):
                        network_id = nic.findtext("NETWORK_ID") or ""
                        network_name = nic.findtext("NETWORK") or f"VNET {network_id}"
                        nic_ip = nic.findtext("IP") or ""
                        if network_id and network_id not in vnets:
                            vnets[network_id] = {
                                "id": network_id,
                                "label": network_name,
                                "cidr": "",
                                "class": network_css_class(len(vnets)),
                                "gateway": "",
                                "bridge": "",
                                "vm_ips": [],
                                "hosts": set(),
                            }
                        vnet_entry = vnets.get(network_id)
                        if not vnet_entry:
                            continue
                        if nic_ip:
                            vnet_entry["vm_ips"].append(nic_ip)
                        if host_name:
                            vnet_entry["hosts"].add(host_name)
                            membership = host_network_membership[host_name].setdefault(network_id, {
                                "label": vnet_entry["label"],
                                "ips": [],
                            })
                            if nic_ip and nic_ip not in membership["ips"]:
                                membership["ips"].append(nic_ip)

        hypervisors = []
        if host_pool_xml:
            try:
                root = ET.fromstring(host_pool_xml)
            except Exception:
                root = None
            if root is not None:
                for host in root.findall("./HOST"):
                    name = host.findtext("NAME") or "Host"
                    monitored_name = host.findtext("./TEMPLATE/HOSTNAME") or name
                    matched = find_match(name, monitored_name, hypervisor_inventory)
                    overrides = matched.get("overrides", {}) if matched else {}
                    memberships = []
                    for _, membership in host_network_membership.get(name, {}).items():
                        memberships.append({
                            "label": membership["label"],
                            "ips": sorted(membership["ips"]),
                        })
                    memberships.sort(key=lambda item: item["label"].lower())
                    hypervisors.append({
                        "label": overrides.get("label") or name,
                        "role_label": overrides.get("role_label", hypervisor_role_label),
                        "network_ips": overrides.get("network_ips", []),
                        "network_memberships": memberships,
                        "detail": overrides.get("detail") or pretty_detail(name, monitored_name),
                    })

        networks = []
        for vnet in sorted(vnets.values(), key=lambda item: item["label"].lower()):
            networks.append({
                "key": vnet["id"],
                "label": vnet["label"],
                "cidr": vnet["cidr"] or "CIDR unavailable",
                "class": vnet["class"],
                "bridge": vnet["bridge"],
                "gateway": vnet["gateway"],
                "host_count": len(vnet["hosts"]),
                "vm_count": len(vnet["vm_ips"]),
            })

        summary = (
            f"Architecture: {len(frontends)}× OpenNebula FE "
            f"{'Servers' if len(frontends) > 1 else 'Node'}"
            f" &nbsp;·&nbsp; {len(hypervisors)}× {hypervisor_role_label} Hypervisors"
            f" &nbsp;·&nbsp; Networks: "
            f"{' / '.join(item['label'] for item in networks) if networks else 'none discovered'}"
        )

        print(json.dumps({
            "summary": summary,
            "frontend_title": "OpenNebula FE Servers" if len(frontends) > 1 else frontend_role_label,
            "frontends": frontends,
            "hypervisors": hypervisors,
            "networks": networks,
            "zone_count": len(zone_ids),
            "frontend_count": len(frontends),
            "hypervisor_count": len(hypervisors),
            "network_count": len(networks),
        }))
        PY
      args:
        executable: /bin/bash
      environment:
        ARCH_FRONTENDS_JSON: "{{ report_arch_frontend_inventory | default([]) | to_json }}"
        ARCH_HYPERVISORS_JSON: "{{ report_arch_hypervisor_inventory | default([]) | to_json }}"
        ARCH_FRONTEND_ROLE_LABEL: "{{ (validation_vars.architecture | default({})).frontend_role_label | default('OpenNebula FE VM') }}"
        ARCH_HYPERVISOR_ROLE_LABEL: "{{ (validation_vars.architecture | default({})).hypervisor_role_label | default('KVM') }}"
      register: report_architecture_cmd
      changed_when: false
      failed_when: false

    - name: Parse architecture discovery result
      ansible.builtin.set_fact:
        discovered_report_architecture: "{{ report_architecture_cmd.stdout | trim | from_json }}"
      when:
        - report_architecture_cmd.stdout is defined
        - report_architecture_cmd.stdout | trim | length > 0

    - name: Render report
      template:
        src: "appendix-cloud-report.j2"
        dest: /tmp/cloud_verification_report.html
      vars:
        repo_version: "{{ repo_version_cmd.stdout }}"
        date: "{{ lookup('pipe', 'date +%Y-%m-%d\\ %H:%M:%S') }}"
        report_date_only: "{{ lookup('pipe', 'date +%Y-%m-%d') }}"
        verification_result: "{{ report_verification_result }}"
        verification_comments: "{{ report_verification_comments }}"
        network_verification_results: "{{ report_network_verification_results }}"
        template_report_architecture: "{{ discovered_report_architecture | default({}) }}"
        template_report_customer: "{{ prompt_report_customer }}"
        template_report_document_version: "{{ prompt_report_document_version }}"
        template_report_abstract: "{{ prompt_report_abstract }}"
        template_report_default_abstract: "{{ report_default_abstract }}"
        template_report_revision_comment: "{{ prompt_report_revision_comment }}"
        template_report_revision_version: "{{ prompt_report_revision_version }}"

    - name: Render PDF print stylesheet
      ansible.builtin.template:
        src: "print_fix.css"
        dest: /tmp/print_fix.css

    - name: Generate PDF report
      ansible.builtin.command:
        argv:
          - weasyprint
          - -s
          - /tmp/print_fix.css
          - /tmp/cloud_verification_report.html
          - /tmp/cloud_verification_report.pdf
      register: report_pdf_cmd
      changed_when: report_pdf_cmd.rc == 0

    - name: Print report location
      ansible.builtin.debug:
        msg: |
          ******************************************************
          Verification report rendered to /tmp/cloud_verification_report.html
          PDF report rendered to /tmp/cloud_verification_report.pdf
          ******************************************************
