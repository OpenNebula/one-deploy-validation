---
# Two-cluster test inventory — replace the dummy IPs with the real ones.
#
# Cluster membership is NOT declared here: it is auto-discovered from
# OpenNebula (`onecluster list`). The grouping below is just a reminder of
# which hypervisor is expected to live in which cluster.

all: {}

frontend:
  hosts:
    fe: { ansible_host: 172.20.0.6 }

node:
  hosts:
    # --- cluster A hypervisors ---
    h1: { ansible_host: 172.20.0.7 }
    h2: { ansible_host: 172.20.0.8 }
    # --- cluster B hypervisors ---
    h3: { ansible_host: 172.20.0.9 }
    h4: { ansible_host: 172.20.0.10 }
