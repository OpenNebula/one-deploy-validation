---
- name: Get list of OpenNebula host IDs and names
  shell: onehost list -l ID,NAME --csv --no-header
  register: host_ids_and_names
  changed_when: false

- name: Ensure the conn matrix template exists in every cluster
  ansible.builtin.include_role:
    name: validation_common
    tasks_from: export_marketapp.yml
  vars:
    _export_app_name: "{{ validation.conn_matrix.market_name }}"
    _export_name: "{{ validation.conn_matrix.market_name }}{{ cm_cluster.name_suffix }}"
    _export_ds_id: "{{ cm_cluster.image_ds_id }}"
  loop: "{{ _one_clusters }}"
  loop_control:
    loop_var: cm_cluster
    label: "{{ cm_cluster.name }}"

# Maps each host's monitored hostname to its cluster name; used by
# node_run_tests to restrict the matrix to same-cluster pairs.
- name: Build hostname to cluster name mapping
  ansible.builtin.set_fact:
    hostname_to_cluster_name: >-
      {{ (hostname_to_cluster_name | d({})) | combine({
           host_name_to_hostname_cmd[item.split(',')[1]]: _host_id_to_cluster[item.split(',')[0]].name
         }) }}
  loop: "{{ host_ids_and_names.stdout_lines }}"
  when: item.split(',')[0] in _host_id_to_cluster

# A failing host/cluster must not abort the play: downstream tasks tolerate a
# partial VM map, so record the failure and continue.
- name: Create the per-host VM groups and VMs
  block:
    - name: Create a dedicated VM group and VM for each host
      ansible.builtin.include_tasks: conn_matrix_per_host.yml
      loop: "{{ host_ids_and_names.stdout_lines }}"
      when: item.split(',')[0] in _host_id_to_cluster
  rescue:
    - name: Record connectivity matrix VM creation failure
      ansible.builtin.set_fact:
        verification_result: >-
          {{ (verification_result | d({}))
             | combine({'Connectivity matrix VM creation (host id ' ~ (host_id | d('?')) ~ ')': 'failed'}) }}

    - name: Show failure
      ansible.builtin.debug:
        msg: "Connectivity matrix VM creation failed (host id {{ host_id | d('?') }}); continuing with the VMs that were created."

- name: Get VM host to VM IP mapping
  shell: onevm list -f NAME~conn-mtx-vm-on-host -l HOST,IP --csv --no-header
  register: vm_host_ip_lines
  changed_when: false

- name: Extract host to VM IP mapping
  set_fact:
    host_name_to_vm_ip: >-
      {{
        dict(
          vm_host_ip_lines.stdout_lines
          | map('split', ',')
          | map('first')
          | map('extract', host_name_to_hostname_cmd)
          | zip(
              vm_host_ip_lines.stdout_lines
              | map('split', ',')
              | map('last')
            )
        )
      }}
