---
- name: Export the test VM template from the marketplace for this cluster
  ansible.builtin.include_role:
    name: validation_common
    tasks_from: export_marketapp.yml
  vars:
    _export_app_name: "{{ _test_vm_name }}"
    _export_name: "{{ _test_vm_name }}{{ current_cluster.name_suffix }}"
    _export_ds_id: "{{ current_cluster.image_ds_id }}"

- name: Verify VM Download from Marketplace
  set_fact:
    verification_result: "{{ (verification_result | default({})) | combine({'Download a test VM template from the marketplace' ~ current_cluster.report_suffix : 'ok' }) }}"

- name: Write extra template variables to a temporary file on the remote host
  ansible.builtin.copy:
    content: "{{ validation.test_vm.vm.template_extra }}"
    dest: "/tmp/test_vm_template_extra.txt"
  when: validation.test_vm.vm.template_extra is defined

- name: Update VM template with extra data
  ansible.builtin.shell: >
    onetemplate update --append {{ _export_template_id }} /tmp/test_vm_template_extra.txt
  register: update_vm_template_extra
  failed_when: update_vm_template_extra.rc != 0
  become: true
  become_user: oneadmin
  when: validation.test_vm.vm.template_extra is defined

- name: Verify VM template update
  set_fact:
    verification_result: "{{ (verification_result | default({})) | combine({'Updating a VM template' ~ current_cluster.report_suffix : 'ok' }) }}"

# Per-cluster maps consumed by create_vm, storage-benchmark and
# oneflow_validation; the scalar facts keep the first cluster's IDs for
# backward compatibility (single-cluster behavior unchanged).
- name: Record per-cluster template and image IDs
  ansible.builtin.set_fact:
    test_vm_template_ids: "{{ (test_vm_template_ids | d({})) | combine({current_cluster.name: _export_template_id}) }}"
    test_vm_template_image_ids: "{{ (test_vm_template_image_ids | d({})) | combine({current_cluster.name: _export_image_id}) }}"
    test_vm_template_id: "{{ test_vm_template_id | d(_export_template_id) }}"
    test_vm_template_image_id: "{{ test_vm_template_image_id | d(_export_image_id) }}"
