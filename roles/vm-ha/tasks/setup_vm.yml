---
# Only execute these steps on a single frontend host AND when VM HA validation is enabled
- name: Export the HA test VM template from the marketplace for this cluster
  ansible.builtin.include_role:
    name: validation_common
    tasks_from: export_marketapp.yml
  vars:
    _export_app_name: "{{ _test_vm_ha_name }}"
    _export_name: "{{ _test_vm_ha_name }}{{ current_cluster.name_suffix }}"
    _export_ds_id: "{{ current_cluster.image_ds_id }}"

- name: Verify VM Download from Marketplace
  set_fact:
    verification_result: "{{ (verification_result | default({})) | combine({'VM HA: download a test VM template from the marketplace' ~ current_cluster.report_suffix : 'ok' }) }}"

- name: "Check if VM already exists"
  ansible.builtin.command: onevm list -l ID --csv --filter NAME=test_vm_ha{{ current_cluster.name_suffix }} --no-header
  register: existing_vm
  changed_when: false

# The HA VM has no NIC, so anchor it to the cluster explicitly.
- name: Instantiate test VM
  ansible.builtin.shell: >
    onetemplate instantiate "{{ _test_vm_ha_name }}{{ current_cluster.name_suffix }}" --name "test_vm_ha{{ current_cluster.name_suffix }}"
    --raw 'SCHED_REQUIREMENTS="CLUSTER_ID = {{ current_cluster.id }}"'
  register: test_vm_ha
  failed_when: "test_vm_ha.rc != 0"
  when: existing_vm.stdout == ""

- name: Save VM id for cleanup
  set_fact:
    test_vm_ha_id: "{{ (existing_vm.stdout | trim) if existing_vm.stdout != '' else (test_vm_ha.stdout.split(':')[1] | trim) }}"

- name: Wait for VM to be in running state
  ansible.builtin.shell: >
    onevm list --f ID={{ test_vm_ha_id }} -l STAT --no-header
  register: vm_state
  failed_when: "vm_state.rc != 0"
  until: vm_state.stdout == "runn"
  retries: 10
  delay: 10

- name: Fetch VM information in JSON format
  ansible.builtin.shell: >
    onevm list --f ID={{ test_vm_ha_id }} -j
  register: vm_info_json
  failed_when: "vm_info_json.rc != 0"

- name: Extract HOSTNAME and HID from VM history
  set_fact:
    host_name: >-
      {{ (vm_info_json.stdout | from_json).VM_POOL.VM[0].HISTORY_RECORDS.HISTORY.HOSTNAME }}
    host_id: >-
      {{ (vm_info_json.stdout | from_json).VM_POOL.VM[0].HISTORY_RECORDS.HISTORY.HID }}

- name: Set the selected host to produce an error for VM HA Test
  set_fact:
    host_name_to_produce_error: "{{ host_name }}"
